services:
  - type: web
    name: aliensocial-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://aliensocialnetwork.com
      - key: PORT
        value: 5000
    healthCheckPath: /api/health
